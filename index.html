<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Play With Me - منصة الألعاب</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-container">
            <div class="logo">
                <h1>🎮 Play With Me</h1>
            </div>
            
            <!-- Navigation -->
            <nav class="nav">
                <button class="menu-toggle" id="menuToggle">
                    <i class="fas fa-bars"></i>
                </button>
                
                <div class="nav-menu" id="navMenu">
                    <a href="#home" class="nav-item">
                        <i class="fas fa-home"></i>
                        <span data-ar="الرئيسية" data-en="Home">الرئيسية</span>
                    </a>
                    <a href="#about" class="nav-item">
                        <i class="fas fa-info-circle"></i>
                        <span data-ar="حول" data-en="About">حول</span>
                    </a>
                    <a href="https://www.tiktok.com" target="_blank" class="nav-item social">
                        <i class="fab fa-tiktok"></i>
                        <span>TikTok</span>
                    </a>
                    <button class="lang-toggle" id="langToggle">
                        <i class="fas fa-globe"></i>
                        <span data-ar="EN" data-en="AR">EN</span>
                    </button>
                </div>
            </nav>
            
            <!-- Search Button -->
            <button class="search-btn" id="searchBtn">
                <i class="fas fa-search"></i>
            </button>
        </div>
    </header>

    <!-- Search Modal -->
    <div class="search-modal" id="searchModal">
        <div class="search-modal-content">
            <button class="close-btn" id="closeSearch">&times;</button>
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="ابحث عن لعبة..." class="search-input" data-placeholder-ar="ابحث عن لعبة..." data-placeholder-en="Search for a game...">
                <div id="searchResults" class="search-results"></div>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Hero Section -->
        <section class="hero" id="home">
            <div class="hero-content">
                <h2 data-ar="ألعابنا" data-en="Our Games">ألعابنا</h2>
                <p data-ar="اختر لعبتك المفضلة وابدأ باللعب الآن!" data-en="Choose your favorite game and start playing now!">اختر لعبتك المفضلة وابدأ باللعب الآن!</p>
            </div>
        </section>

        <!-- Games Grid -->
        <section class="games-section">
            <div class="games-grid" id="gamesGrid">
                <!-- Games will be populated here by JavaScript -->
            </div>
        </section>
    </main>

    <!-- Game Details Modal -->
    <div class="game-modal" id="gameModal">
        <div class="modal-overlay" id="modalOverlay"></div>
        <div class="modal-content">
            <button class="close-btn" id="closeModal">&times;</button>
            <div class="modal-body">
                <img id="modalGameImage" src="" alt="Game" class="modal-image">
                <div class="modal-info">
                    <h2 id="modalGameTitle"></h2>
                    <p id="modalGameDescription" class="game-description-full"></p>
                    <div class="modal-rating">
                        <div class="stars" id="modalGameRating"></div>
                        <span id="modalGameRatingText"></span>
                    </div>
                    <div class="download-buttons">
                        <button class="download-btn android" id="downloadAndroid">
                            <i class="fab fa-android"></i>
                            <span data-ar="تحميل أندرويد" data-en="Download Android">تحميل أندرويد</span>
                        </button>
                        <button class="download-btn iphone" id="downloadIPhone">
                            <i class="fab fa-apple"></i>
                            <span data-ar="تحميل آيفون" data-en="Download iPhone">تحميل آيفون</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Games Data and Scripts -->
    <script src="games-data.js"></script>
    <script src="script.js"></script>
</body>
</html>
